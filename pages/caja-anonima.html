<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Anónima - Lothy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header-footer.css">
    <link rel="stylesheet" href="../css/pages-additional.css">
    <script src="../js/header.js" defer></script>
</head>
<body>

    <header id="main-header">
        <lothy-header></lothy-header>
    </header>

    <main id="main-content">
        <section class="caja-anonima-section">
            <div class="container">               

                <section class="caja-anonima-section">

                    <div class="container">

                        <div class="caja-content">

                            <div class="page-header">
                                <h1>Caja Anónima</h1>
                                <p class="subtitle">
                                    Comparte tus pensamientos, experiencias y opiniones de manera libre.
                                </p>
                            </div>


                            <div class="form-box">

                                <h2>Comparte tu mensaje</h2>


                                <form id="anonymous-form">

                                    <textarea 
                                        placeholder="Escribe aquí lo que quieras compartir. Puedes expresar tus ideas, experiencias, dudas o sentimientos."
                                        required>
                                    </textarea>


                                    <button type="submit" class="btn btn-primary">
                                        Enviar Comentario
                                    </button>


                                </form>


                                <p class="form-note">
                                    <i class="fas fa-lock"></i>
                                    Tu mensaje será tratado de forma privada y respetuosa.
                                </p>


                            </div>


                        </div>

                    </div>

                </section>
               
            </div>
        </section>
    </main>
    <lothy-footer></lothy-footer>

    <!-- BOTÓN FLOTANTE REUTILIZABLE -->
    <lothy-floating-button></lothy-floating-button>

    <script src="../js/footer.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/floating-button.js"></script>
</body>
</html>
